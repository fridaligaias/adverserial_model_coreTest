<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adversarial Image Test</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <h1>Adversarial Image Protection Test</h1>

  <button id="selectBtn">
    Select image to apply adversarial layer
  </button>

  <div id="gallery" hidden></div>

  <button id="submitBtn" disabled>
    Apply adversarial layer
  </button>

  <h2>Output</h2>
  <div id="progressContainer" style="width: 100%; background: #ddd; height: 20px; display: none; margin: 10px 0;">
    <div id="progressBar" style="width: 0%; height: 100%; background: #4caf50; transition: width 0.1s;"></div>
  </div>
  <canvas id="outputCanvas" width="224" height="224"></canvas>

  <br><br>
  <a id="downloadLink" href="#" hidden download="adversarial.png">Download image</a>

  <script type="module" src="./app.js"></script>
</body>
</html>
